services:
  postgres:
    image: postgres:16-alpine
    container_name: elearning-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-elearning}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-elearning}
      POSTGRES_MULTIPLE_DATABASES: elearning_users,elearning_courses,elearning_quizzes,elearning_payments,elearning_notifications,elearning_analytics
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U elearning"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:4.0-management-alpine
    container_name: elearning-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-elearning}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-elearning}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: elearning-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: elearning-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-elearning}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-elearning123}
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-gateway:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE: api-gateway
    container_name: elearning-api-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

  user-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE: user-service
    container_name: elearning-user-service
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/elearning_users
      SPRING_DATASOURCE_USERNAME: elearning
      SPRING_DATASOURCE_PASSWORD: elearning
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: elearning
      RABBITMQ_PASSWORD: elearning
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  course-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE: course-service
    container_name: elearning-course-service
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/elearning_courses
      SPRING_DATASOURCE_USERNAME: elearning
      SPRING_DATASOURCE_PASSWORD: elearning
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: elearning
      RABBITMQ_PASSWORD: elearning
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  quiz-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE: quiz-service
    container_name: elearning-quiz-service
    restart: unless-stopped
    ports:
      - "8083:8083"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/elearning_quizzes
      SPRING_DATASOURCE_USERNAME: elearning
      SPRING_DATASOURCE_PASSWORD: elearning
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: elearning
      RABBITMQ_PASSWORD: elearning
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  payment-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE: payment-service
    container_name: elearning-payment-service
    restart: unless-stopped
    ports:
      - "8084:8084"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/elearning_payments
      SPRING_DATASOURCE_USERNAME: elearning
      SPRING_DATASOURCE_PASSWORD: elearning
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: elearning
      RABBITMQ_PASSWORD: elearning
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  notification-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE: notification-service
    container_name: elearning-notification-service
    restart: unless-stopped
    ports:
      - "8085:8085"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/elearning_notifications
      SPRING_DATASOURCE_USERNAME: elearning
      SPRING_DATASOURCE_PASSWORD: elearning
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: elearning
      RABBITMQ_PASSWORD: elearning
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  analytics-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE: analytics-service
    container_name: elearning-analytics-service
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/elearning_analytics
      SPRING_DATASOURCE_USERNAME: elearning
      SPRING_DATASOURCE_PASSWORD: elearning
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: elearning
      RABBITMQ_PASSWORD: elearning
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend/web
      dockerfile: Dockerfile
    container_name: elearning-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
    depends_on:
      - api-gateway

volumes:
  postgres-data:
  rabbitmq-data:
  redis-data:
  minio-data:

