server:
  port: 8081

spring:
  application:
    name: user-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/elearning_users}
    username: ${SPRING_DATASOURCE_USERNAME:elearning}
    password: ${SPRING_DATASOURCE_PASSWORD:elearning}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:elearning}
    password: ${RABBITMQ_PASSWORD:elearning}

jwt:
  secret: ${JWT_SECRET:c2VjcmV0LWtleS1mb3ItZWxlYXJuaW5nLXBsYXRmb3JtLTI1Ng==}
  access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:900000}
  refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION:604800000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
